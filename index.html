<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>nybble</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Space+Grotesk:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0c0c0f;
    --bg2:       #111116;
    --bg3:       #18181f;
    --bg4:       #1f1f28;
    --border:    #2a2a38;
    --border2:   #353545;
    --text:      #e8e8f0;
    --text2:     #888899;
    --text3:     #55556a;
    --accent:    #7c6af7;
    --accent2:   #9d8fff;
    --accent-bg: rgba(124,106,247,0.12);
    --accent-bd: rgba(124,106,247,0.35);
    --green:     #4ade80;
    --green-bg:  rgba(74,222,128,0.15);
    --green-bd:  rgba(74,222,128,0.35);
    --red:       #f87171;
    --red-bg:    rgba(248,113,113,0.12);
    --red-bd:    rgba(248,113,113,0.35);
    --amber:     #fbbf24;
    --amber-bg:  rgba(251,191,36,0.1);
    --amber-bd:  rgba(251,191,36,0.3);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Space Grotesk', sans-serif;
  }

  html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 15px; }

  body { display: flex; flex-direction: column; align-items: center; padding: 2.5rem 1rem 4rem; }

  body::before {
    content: ''; position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    pointer-events: none; z-index: 100;
  }

  .container { width: 100%; max-width: 640px; }

  header {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 2.5rem; border-bottom: 1px solid var(--border); padding-bottom: 1rem;
  }

  .logo {
    font-family: var(--mono); font-size: 13px; font-weight: 400;
    color: var(--text3); letter-spacing: 0.08em; cursor: default; user-select: none;
  }
  .logo .hi { color: var(--text3); opacity: 0.07; font-size: 11px; margin-right: 4px; }
  .logo .name-accent { color: var(--accent2); }
  .logo .name-text { color: var(--text3); }

  .stats { display: flex; gap: 1.5rem; }
  .stat { display: flex; flex-direction: column; align-items: flex-end; }
  .stat-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text3); }
  .stat-val { font-family: var(--mono); font-size: 20px; font-weight: 700; color: var(--text); line-height: 1; transition: color 0.2s; }
  .stat-val.bump { color: var(--accent2); }

  .controls { display: flex; gap: 8px; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
  .pill-group { display: flex; gap: 2px; }

  .pill {
    font-family: var(--mono); font-size: 11px; font-weight: 500; letter-spacing: 0.04em;
    padding: 6px 14px; border-radius: 100px; border: 1px solid var(--border2);
    background: var(--bg3); color: var(--text2); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .pill:hover { background: var(--bg4); color: var(--text); }
  .pill.active { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-bd); }
  .pill.hint-pill { color: var(--amber); border-color: var(--amber-bd); }
  .pill.hint-pill:hover { background: var(--amber-bg); }
  .pill.hint-pill.active { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-bd); }

  .spacer { flex: 1; }
  .byte-wrap { display: flex; align-items: center; gap: 8px; }
  .byte-label { font-family: var(--mono); font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--text3); }
  .byte-sel {
    font-family: var(--mono); font-size: 13px; background: var(--bg3); color: var(--text);
    border: 1px solid var(--border2); border-radius: 8px; padding: 5px 8px; cursor: pointer; outline: none;
  }
  .byte-sel:focus { border-color: var(--accent-bd); }

  .card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
    padding: 2rem; position: relative; overflow: hidden;
  }
  .card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-bd), transparent);
  }

  .prompt-section { margin-bottom: 2rem; }
  .prompt-tag { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.2em; color: var(--text3); margin-bottom: 10px; }
  .prompt-val { font-family: var(--mono); font-size: 48px; font-weight: 700; color: var(--text); line-height: 1; letter-spacing: -0.02em; }
  .prompt-val.binary { font-size: 28px; letter-spacing: 0.12em; color: var(--accent2); }
  .prompt-val.hex-prompt { color: var(--green); letter-spacing: 0.04em; }

  #bit-area { display: none; }

  .bits-wrap { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
  .bit-row-inner { display: flex; gap: 5px; flex-wrap: nowrap; }
  .bit-col { display: flex; flex-direction: column; align-items: center; gap: 4px; }

  .bit-btn {
    width: 48px; height: 48px; font-family: var(--mono); font-size: 18px; font-weight: 700;
    border: 1px solid var(--border2); background: var(--bg3); color: var(--text3);
    border-radius: 10px; cursor: pointer; transition: background 0.1s, color 0.1s, border-color 0.1s;
    display: flex; align-items: center; justify-content: center;
  }
  .bit-btn:hover { background: var(--bg4); color: var(--text2); }
  .bit-btn.on { background: var(--accent-bg); color: var(--accent2); border-color: var(--accent-bd); }
  .bit-btn.wrong-bit { background: var(--red-bg); color: var(--red); border-color: var(--red-bd); }
  .bit-btn.correct-bit { background: var(--green-bg); color: var(--green); border-color: var(--green-bd); }
  .bit-btn:active { transform: scale(0.93); }

  .bit-hint { font-family: var(--mono); font-size: 9px; color: var(--text3); text-align: center; width: 48px; transition: opacity 0.2s; }
  .hint-hidden .bit-hint { opacity: 0; pointer-events: none; }

  .live-sum { font-family: var(--mono); font-size: 13px; color: var(--text3); margin-top: 4px; }
  .live-sum span { font-weight: 500; color: var(--text); }

  #dec-area { display: none; }
  #hex-area { display: none; }

  .dec-input {
    font-family: var(--mono); font-size: 36px; font-weight: 700; width: 220px;
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px;
    color: var(--text); padding: 12px 16px; text-align: center; outline: none;
    transition: border-color 0.15s; margin-bottom: 1.5rem;
  }
  .dec-input:focus { border-color: var(--accent-bd); }

  .hex-input {
    font-family: var(--mono); font-size: 36px; font-weight: 700; width: 220px;
    background: var(--bg3); border: 1px solid var(--border2); border-radius: 12px;
    color: var(--green); padding: 12px 16px; text-align: center; outline: none;
    transition: border-color 0.15s; margin-bottom: 1.5rem; text-transform: uppercase;
  }
  .hex-input:focus { border-color: var(--green-bd); }
  .hex-prefix { font-family: var(--mono); font-size: 18px; color: var(--text3); margin-bottom: 6px; }

  .actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

  .btn-check {
    font-family: var(--mono); font-size: 13px; font-weight: 500; letter-spacing: 0.06em;
    padding: 10px 28px; background: var(--accent); color: #fff; border: none;
    border-radius: 10px; cursor: pointer; transition: all 0.15s;
  }
  .btn-check:hover { background: var(--accent2); }
  .btn-check:active { transform: scale(0.97); }

  .btn-new {
    font-family: var(--mono); font-size: 11px; letter-spacing: 0.06em; padding: 9px 16px;
    background: transparent; color: var(--text3); border: 1px solid var(--border);
    border-radius: 10px; cursor: pointer; transition: all 0.15s;
  }
  .btn-new:hover { background: var(--bg3); color: var(--text2); border-color: var(--border2); }

  .feedback { margin-top: 1.25rem; font-family: var(--mono); font-size: 15px; font-weight: 500; min-height: 24px; letter-spacing: 0.02em; }
  .feedback.correct { color: var(--green); }
  .feedback.wrong   { color: var(--red); }

  .byte-row-wrap { display: flex; align-items: flex-start; gap: 10px; }
  .byte-row-label {
    font-family: var(--mono); font-size: 9px; letter-spacing: 0.1em; color: var(--text3);
    writing-mode: vertical-rl; text-orientation: mixed; transform: rotate(180deg);
    align-self: center; white-space: nowrap; user-select: none;
  }
  .byte-row-label.msb { color: var(--accent2); opacity: 0.7; }
  .byte-row-label.lsb { color: var(--text3); }

  .bit-separator { width: 1px; height: 48px; background: var(--border2); margin: 0 3px; align-self: center; }

  .kbd-hint { font-family: var(--mono); font-size: 10px; color: var(--text3); margin-top: 10px; letter-spacing: 0.04em; }
  .kbd-hint kbd {
    display: inline-block; background: var(--bg4); border: 1px solid var(--border2);
    border-radius: 4px; padding: 1px 5px; font-family: var(--mono); font-size: 10px; color: var(--text3);
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo" id="logo">
      <span class="hi" id="logo-bit">0</span><span id="logo-name"><span class="name-text">ny</span><span class="name-accent">bb</span><span class="name-text">le</span></span>
    </div>
    <div class="stats">
      <div class="stat">
        <span class="stat-label">streak</span>
        <span class="stat-val" id="streak">0</span>
      </div>
      <div class="stat">
        <span class="stat-label">score</span>
        <span class="stat-val" id="score">0</span>
      </div>
    </div>
  </header>

  <div class="controls">
    <div class="pill-group">
      <button class="pill active" id="btn-dec2bin" onclick="setMode('dec2bin')">dec ➔ bin</button>
      <button class="pill" id="btn-bin2dec" onclick="setMode('bin2dec')">bin ➔ dec</button>
      <button class="pill" id="btn-hex2dec" onclick="setMode('hex2dec')">hex ➔ dec</button>
      <button class="pill" id="btn-dec2hex" onclick="setMode('dec2hex')">dec ➔ hex</button>
    </div>
    <button class="pill hint-pill active" id="btn-hints" onclick="toggleHints()" style="width:100px;text-align:center">hints: on</button>
    <button class="pill hint-pill" id="btn-sum" onclick="toggleSum()" style="width:90px;text-align:center">peek: off</button>
    <button class="pill hint-pill" id="btn-sound" onclick="toggleSound()" style="width:100px;text-align:center">sound: off</button>
    <div class="spacer"></div>
    <div class="byte-wrap">
      <span class="byte-label">bytes</span>
      <select class="byte-sel" id="byte-sel" onchange="newRound()">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
      </select>
    </div>
  </div>

  <div class="card">
    <div class="prompt-section">
      <div class="prompt-tag" id="prompt-tag">convert this number</div>
      <div class="prompt-val" id="prompt"></div>
    </div>

    <div id="bit-area">
      <div class="bits-wrap" id="bits-wrap"></div>
      <div class="live-sum" id="sum-val" style="visibility:hidden">= <span id="bit-live">0</span></div>
    </div>

    <div id="dec-area">
      <input class="dec-input" type="text" id="dec-input" inputmode="numeric" placeholder="0"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')"
        onkeydown="if(event.key==='Enter') checkAnswer()" />
    </div>

    <div id="hex-area">
      <div class="hex-prefix">0x</div>
      <input class="hex-input" type="text" id="hex-input" inputmode="text" placeholder="00"
        oninput="this.value=this.value.replace(/[^0-9a-fA-F]/g,'').toUpperCase()"
        onkeydown="if(event.key==='Enter') checkAnswer()" />
    </div>

    <div class="actions">
      <button class="btn-check" onclick="checkAnswer()">check</button>
      <button class="btn-new" onclick="newRound()">↺ new</button>
    </div>

    <div class="feedback" id="feedback"></div>
    <div class="kbd-hint" id="kbd-hint" style="margin-top:1.25rem">toggle bits with keys <kbd>1</kbd>–<kbd>8</kbd></div>
  </div>

</div>

<script>
  // ── state ─────────────────────────────────────────────────────────────────
  let mode     = 'dec2bin';
  let bits     = [];
  let target   = 0;
  let streakVal = 0, scoreVal = 0;
  let hintsOn  = true;
  let sumOn    = false;
  let soundOn  = false;
  let checking = false;

  // ── audio ─────────────────────────────────────────────────────────────────
  const AC = window.AudioContext || window.webkitAudioContext;
  let ac = null;

  function getAC() {
    if (!ac) ac = new AC();
    return ac;
  }

  function playTone(freq, type, duration, gainVal, when) {
    if (!soundOn) return;
    const ctx = getAC();
    const t   = when || ctx.currentTime;
    const osc = ctx.createOscillator();
    const g   = ctx.createGain();
    osc.connect(g); g.connect(ctx.destination);
    osc.type = type; osc.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(gainVal, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
    osc.start(t); osc.stop(t + duration);
  }

  function soundBitFlip(isOn) {
    playTone(isOn ? 880 : 440, 'square', 0.05, 0.04);
  }

  function soundCorrect() {
    if (!soundOn) return;
    const ctx = getAC(); const t = ctx.currentTime;
    [523, 659, 784].forEach((f, i) => playTone(f, 'triangle', 0.18, 0.08, t + i * 0.08));
  }

  function soundWrong() {
    if (!soundOn) return;
    const ctx = getAC(); const t = ctx.currentTime;
    [220, 180].forEach((f, i) => playTone(f, 'sawtooth', 0.15, 0.06, t + i * 0.1));
  }

  // ── toggles ───────────────────────────────────────────────────────────────
  function toggleHints() {
    hintsOn = !hintsOn;
    document.getElementById('btn-hints').textContent = 'hints: ' + (hintsOn ? 'on' : 'off');
    document.getElementById('btn-hints').classList.toggle('active', hintsOn);
    document.getElementById('bits-wrap').classList.toggle('hint-hidden', !hintsOn);
  }

  function toggleSum() {
    sumOn = !sumOn;
    document.getElementById('btn-sum').textContent = 'peek: ' + (sumOn ? 'on' : 'off');
    document.getElementById('btn-sum').classList.toggle('active', sumOn);
    document.getElementById('sum-val').style.visibility = sumOn ? 'visible' : 'hidden';
  }

  function toggleSound() {
    soundOn = !soundOn;
    document.getElementById('btn-sound').textContent = 'sound: ' + (soundOn ? 'on' : 'off');
    document.getElementById('btn-sound').classList.toggle('active', soundOn);
    if (soundOn) { getAC(); playTone(660, 'triangle', 0.1, 0.06); }
  }

  // ── mode ──────────────────────────────────────────────────────────────────
  function setMode(m) {
    mode = m;
    ['dec2bin','bin2dec','hex2dec','dec2hex'].forEach(id =>
      document.getElementById('btn-' + id).classList.toggle('active', id === m)
    );
    newRound();
  }

  // ── helpers ───────────────────────────────────────────────────────────────
  function numBits() { return parseInt(document.getElementById('byte-sel').value) * 8; }
  function maxVal()  { return Math.pow(2, numBits()) - 1; }

  function formatBinary(s) { return s.match(/.{1,8}/g).join(' '); }

  function toHex(n, bytes) { return n.toString(16).toUpperCase().padStart(bytes * 2, '0'); }

  // ── new round ─────────────────────────────────────────────────────────────
  function newRound() {
    checking = false;
    target = Math.floor(Math.random() * (maxVal() + 1));
    bits = new Array(numBits()).fill(0);
    document.getElementById('feedback').textContent = '';
    document.getElementById('feedback').className = 'feedback';

    const promptEl  = document.getElementById('prompt');
    const kbdHint   = document.getElementById('kbd-hint');
    const bytes     = parseInt(document.getElementById('byte-sel').value);

    document.getElementById('bit-area').style.display = 'none';
    document.getElementById('dec-area').style.display = 'none';
    document.getElementById('hex-area').style.display = 'none';
    document.getElementById('btn-hints').style.visibility = 'visible';
    document.getElementById('btn-sum').style.visibility = 'visible';

    kbdHint.style.display = 'none';

    if (mode === 'dec2bin') {
      promptEl.textContent = target;
      promptEl.className = 'prompt-val';
      document.getElementById('bit-area').style.display = 'block';
      kbdHint.style.display = bytes === 1 ? 'block' : 'none';
      renderBits();
    } else if (mode === 'bin2dec') {
      promptEl.textContent = formatBinary(target.toString(2).padStart(numBits(), '0'));
      promptEl.className = 'prompt-val binary';
      document.getElementById('dec-area').style.display = 'block';
      document.getElementById('btn-hints').style.visibility = 'hidden';
      document.getElementById('btn-sum').style.visibility = 'hidden';
      const inp = document.getElementById('dec-input');
      inp.value = ''; inp.max = maxVal();
      setTimeout(() => inp.focus(), 50);
    } else if (mode === 'hex2dec') {
      promptEl.textContent = '0x' + toHex(target, bytes);
      promptEl.className = 'prompt-val hex-prompt';
      document.getElementById('dec-area').style.display = 'block';
      document.getElementById('btn-hints').style.visibility = 'hidden';
      document.getElementById('btn-sum').style.visibility = 'hidden';
      const inp = document.getElementById('dec-input');
      inp.value = ''; inp.max = maxVal();
      setTimeout(() => inp.focus(), 50);
    } else {
      // dec2hex
      promptEl.textContent = target;
      promptEl.className = 'prompt-val';
      document.getElementById('hex-area').style.display = 'block';
      document.getElementById('btn-hints').style.visibility = 'hidden';
      document.getElementById('btn-sum').style.visibility = 'hidden';
      const inp = document.getElementById('hex-input');
      inp.value = ''; inp.maxLength = bytes * 2;
      setTimeout(() => inp.focus(), 50);
    }
  }

  // ── bit rendering ─────────────────────────────────────────────────────────
  function renderBits(highlights) {
    const n = numBits();
    const wrap = document.getElementById('bits-wrap');
    wrap.innerHTML = '';
    wrap.className = 'bits-wrap' + (hintsOn ? '' : ' hint-hidden');
    const byteCount = n / 8;

    for (let b = 0; b < byteCount; b++) {
      const row = document.createElement('div');
      row.className = 'bit-row-inner';

      for (let j = 0; j < 8; j++) {
        const i = b * 8 + j;
        const pow = n - 1 - i;
        const col = document.createElement('div');
        col.className = 'bit-col';

        const btn = document.createElement('button');
        let cls = 'bit-btn';
        if (highlights) {
          cls += highlights[i] === 'correct' ? ' correct-bit' : ' wrong-bit';
        } else if (bits[i]) {
          cls += ' on';
        }
        btn.className = cls;
        btn.textContent = bits[i];
        btn.setAttribute('aria-label', `bit ${pow}`);
        btn.onclick = () => {
          if (checking) return;
          bits[i] ^= 1;
          soundBitFlip(bits[i]);
          renderBits();
          updateLive();
        };

        const lbl = document.createElement('div');
        lbl.className = 'bit-hint';
        const pv = Math.pow(2, pow);
        lbl.textContent = pv >= 1000 ? Math.round(pv/1000)+'k' : pv;

        col.appendChild(btn);
        col.appendChild(lbl);
        row.appendChild(col);
      }

      if (byteCount > 1) {
        const rowWrap = document.createElement('div');
        rowWrap.className = 'byte-row-wrap';
        const tag = document.createElement('div');
        tag.className = 'byte-row-label ' + (b === 0 ? 'msb' : (b === byteCount - 1 ? 'lsb' : ''));
        tag.textContent = b === 0 ? 'MSB' : (b === byteCount - 1 ? 'LSB' : `byte ${byteCount - b}`);
        rowWrap.appendChild(row);
        rowWrap.appendChild(tag);
        wrap.appendChild(rowWrap);
      } else {
        wrap.appendChild(row);
      }
    }
    updateLive();
  }

  function updateLive() {
    const val = bits.reduce((a, b, i) => a + b * Math.pow(2, numBits() - 1 - i), 0);
    document.getElementById('bit-live').textContent = val;
  }

  // ── keyboard shortcuts (1–8 toggle bits in dec2bin) ───────────────────────
  document.addEventListener('keydown', e => {
    if (mode !== 'dec2bin') return;
    if (e.target.tagName === 'INPUT') return;
    const k = parseInt(e.key);
    if (k >= 1 && k <= 8) {
      const i = k - 1;
      if (i < bits.length) {
        bits[i] ^= 1;
        soundBitFlip(bits[i]);
        renderBits();
        updateLive();
      }
    }
    if (e.key === 'Enter') checkAnswer();
  });

  // ── check answer ──────────────────────────────────────────────────────────
  function getCurrentAnswer() {
    if (mode === 'dec2bin') {
      return bits.reduce((a, b, i) => a + b * Math.pow(2, numBits() - 1 - i), 0);
    } else if (mode === 'bin2dec' || mode === 'hex2dec') {
      return parseInt(document.getElementById('dec-input').value) || 0;
    } else {
      const raw = document.getElementById('hex-input').value;
      return raw ? parseInt(raw, 16) : 0;
    }
  }

  function checkAnswer() {
    const ans = getCurrentAnswer();
    const fb  = document.getElementById('feedback');

    if (ans === target) {
      streakVal++;
      scoreVal += 1 + Math.floor(numBits() / 8);
      updateStats();
      soundCorrect();
      fb.textContent = '✓ correct';
      fb.className = 'feedback correct';
      setTimeout(newRound, 900);
    } else {
      streakVal = 0;
      updateStats();
      soundWrong();

      if (mode === 'dec2bin') {
        // bit-level breakdown
        checking = true;
        const correctBits = target.toString(2).padStart(numBits(), '0').split('').map(Number);
        const highlights = bits.map((b, i) => b === correctBits[i] ? 'correct' : 'wrong');
        renderBits(highlights);
        const wrongCount = highlights.filter(h => h === 'wrong').length;
        fb.textContent = `✗ ${wrongCount} bit${wrongCount !== 1 ? 's' : ''} off — answer: ${target.toString(2).padStart(numBits(), '0')}`;
      } else if (mode === 'bin2dec') {
        fb.textContent = '✗ answer: ' + target;
      } else if (mode === 'hex2dec') {
        fb.textContent = '✗ answer: ' + target;
      } else {
        fb.textContent = '✗ answer: 0x' + toHex(target, parseInt(document.getElementById('byte-sel').value));
      }
      fb.className = 'feedback wrong';
    }
  }

  function updateStats() {
    const s  = document.getElementById('streak');
    const sc = document.getElementById('score');
    s.textContent  = streakVal;
    sc.textContent = scoreVal;
    [s, sc].forEach(el => {
      el.classList.add('bump');
      setTimeout(() => el.classList.remove('bump'), 300);
    });
  }

  // ── logo easter egg ───────────────────────────────────────────────────────
  const logoNames = [
    { bit: '0', html: '<span class="name-text">ny</span><span class="name-accent">bb</span><span class="name-text">le</span>' },
    { bit: '1', html: '<span class="name-text">bit</span><span class="name-accent">fl</span><span class="name-text">ip</span>' },
  ];
  let logoState = 0;

  function swapLogo() {
    logoState ^= 1;
    const l = logoNames[logoState];
    const bitEl  = document.getElementById('logo-bit');
    const nameEl = document.getElementById('logo-name');
    bitEl.style.opacity  = '0';
    nameEl.style.opacity = '0';
    setTimeout(() => {
      bitEl.textContent  = l.bit;
      nameEl.innerHTML   = l.html;
      bitEl.style.transition  = 'opacity 0.6s';
      nameEl.style.transition = 'opacity 0.6s';
      bitEl.style.opacity  = '1';
      nameEl.style.opacity = '1';
    }, 300);
    // next swap: random interval 18–40s
    setTimeout(swapLogo, 18000 + Math.random() * 22000);
  }

  // first swap after 20–45s
  setTimeout(swapLogo, 20000 + Math.random() * 25000);

  // ── init ──────────────────────────────────────────────────────────────────
  document.getElementById('btn-hints').classList.add('active');
  newRound();
</script>
</body>
</html>
